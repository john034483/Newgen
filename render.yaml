services:
  - type: web
    name: onsint-core
    env: docker
    plan: starter # Starter plan is required on Render to support persistent disks
    branch: main
    numInstances: 1
    disk:
      name: onsint-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /app/data/ig_int_vault.db
